<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Fit - Plantilla Gimnasio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: #f2f2f2; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        .navbar { background-color: rgba(0, 0, 0, 0.9); border-bottom: 2px solid #FF6A00; }
        .text-neon { color: #FF6A00; text-shadow: 0 0 8px rgba(255, 106, 0, 0.6); }
        .hero-section {
            background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1920&q=80') center/cover;
            height: 100vh; display: flex; align-items: center;
        }
        .btn-action {
            background-color: #FF6A00; color: #000; font-weight: bold; padding: 15px 40px; font-size: 1.2rem; border: none; transform: skewX(-10deg); transition: 0.3s;
        }
        .btn-action:hover { background-color: #fff; color: #FF6A00; box-shadow: 0 0 15px #FF6A00; }
        .btn-action span { display: inline-block; transform: skewX(10deg); }
        .class-card { background: #1a1a1a; border-left: 5px solid #FF6A00; transition: 0.3s; }
        .class-card:hover { transform: translateX(10px); background: #222; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top p-3">
        <div class="container">
            <a class="navbar-brand text-neon fs-2 m-0" href="#">NEON FIT</a>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <h1 class="display-1 fw-bold mb-3">Supera tus <br><span class="text-neon">Límites</span></h1>
                    <p class="lead mb-5" style="font-family: Arial, sans-serif; text-transform: none;">Equipamiento de primer nivel y entrenadores personales listos para transformar tu cuerpo.</p>
                    <button class="btn-action" onclick="joinNow()"><span>Únete Hoy</span></button>
                </div>
            </div>
        </div>
    </header>

    <section class="container py-5 mt-5">
        <h2 class="text-center text-neon mb-5">Clases Destacadas</h2>
        <div class="row g-4" id="classes-container">
            </div>
    </section>

    <script>
        const classes = ['Crossfit', 'Spinning', 'Boxeo', 'Hiit'];
        const container = document.getElementById('classes-container');
        
        classes.forEach(c => {
            container.innerHTML += `
                <div class="col-md-6">
                    <div class="class-card p-4">
                        <h3 class="m-0">${c} <span class="float-end text-neon">★</span></h3>
                    </div>
                </div>`;
        });

        function joinNow() { alert('Redirigiendo al formulario de inscripción...'); }
    </script>
</body>
</html>
